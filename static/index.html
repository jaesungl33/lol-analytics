<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LoL Analytics</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; line-height: 1.6; }
    .row { display: flex; gap: 8px; }
    input { flex: 1; padding: 8px 10px; font-size: 15px; }
    button { padding: 8px 14px; font-size: 15px; cursor: pointer; }
    .metric { border: 1px solid #ddd; border-radius: 8px; padding: 12px 16px; margin: 12px 0; }
    .value { font-size: 28px; font-weight: 600; }
    .todo { color: #b8860b; }
    .games { color: #666; font-size: 14px; }
    .status { color: #666; font-size: 14px; }
    pre { background: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 13px; }
    .coach { border: 1px solid #cde; background: #f3f8ff; border-radius: 8px; padding: 12px 16px; margin: 12px 0; white-space: pre-wrap; }
    .coach h3 { margin: 0 0 6px; }
    .grounded { color: #2e7d32; font-size: 13px; }
  </style>
</head>
<body>
  <h1>LoL Analytics</h1>
  <p>Search any player by Riot ID (e.g. <code>SamplePlayer#NA1</code> in fixtures mode).</p>
  <div class="row">
    <input id="riotId" placeholder="GameName#TAG" value="SamplePlayer#NA1" />
    <button id="search">Search</button>
    <button id="coach">Coach me</button>
  </div>
  <p class="status" id="status"></p>
  <div id="out"></div>
  <div id="coachOut"></div>

  <script>
    const out = document.getElementById("out");
    const coachOut = document.getElementById("coachOut");
    const statusEl = document.getElementById("status");
    const input = document.getElementById("riotId");

    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

    async function search() {
      const riotId = input.value.trim();
      out.innerHTML = "";
      coachOut.innerHTML = "";
      statusEl.textContent = "Queuing ingest…";
      try {
        // 1. Enqueue an ingest job.
        const res = await fetch("/api/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ riot_id: riotId }),
        });
        if (!res.ok) {
          const err = await res.json();
          statusEl.textContent = "Error: " + (err.detail?.[0]?.msg || err.detail || res.status);
          return;
        }
        const { job_id } = await res.json();

        // 2. Poll the job until it finishes.
        const status = await pollJob(job_id);
        if (status === "error") return;

        // 3. Fetch the computed stats.
        statusEl.textContent = "Computing stats…";
        const stats = await (await fetch("/api/stats?riot_id=" + encodeURIComponent(riotId))).json();
        statusEl.textContent = "";
        render(stats);
      } catch (e) {
        statusEl.textContent = "Error: " + e;
      }
    }

    async function pollJob(jobId) {
      for (let i = 0; i < 40; i++) {
        const job = await (await fetch("/api/jobs/" + jobId)).json();
        statusEl.textContent = "Ingest status: " + job.status + "…";
        if (job.status === "done") return "done";
        if (job.status === "error") {
          statusEl.textContent = "Ingest failed: " + job.error;
          return "error";
        }
        await sleep(400);
      }
      statusEl.textContent = "Timed out waiting for ingest.";
      return "error";
    }

    function render(data) {
      if (!data.ingested) { out.innerHTML = "<p>" + (data.hint || "Not ingested") + "</p>"; return; }
      let html = "<h2>" + data.riot_id + "</h2>";
      html += '<p class="games">Analysed ' + data.games_analysed + " games" +
              (data.cached ? " (cached)" : "") + "</p>";
      for (const [name, m] of Object.entries(data.metrics)) {
        html += '<div class="metric"><div>' + name + "</div>";
        if (m.value === null) {
          html += '<div class="value todo">' + (m.status || "—") + "</div>";
        } else {
          html += '<div class="value">' + m.value + "</div>";
        }
        html += "</div>";
      }
      html += "<details><summary>Raw response</summary><pre>" + JSON.stringify(data, null, 2) + "</pre></details>";
      out.innerHTML = html;
    }

    async function getCoaching() {
      const riotId = input.value.trim();
      coachOut.innerHTML = "";
      statusEl.textContent = "Asking the coach…";
      try {
        const data = await (await fetch("/api/coach?riot_id=" + encodeURIComponent(riotId))).json();
        statusEl.textContent = "";
        if (!data.ingested) { coachOut.innerHTML = "<p>" + (data.hint || "Search first") + "</p>"; return; }
        const badge = data.grounded
          ? '<div class="grounded">✓ grounded: every number is backed by the stats</div>'
          : '<div style="color:#b00">⚠ ungrounded numbers detected</div>';
        coachOut.innerHTML = '<div class="coach"><h3>Coaching</h3>' +
          escapeHtml(data.feedback) + "</div>" + badge;
      } catch (e) {
        statusEl.textContent = "Error: " + e;
      }
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    document.getElementById("search").addEventListener("click", search);
    document.getElementById("coach").addEventListener("click", getCoaching);
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") search(); });
  </script>
</body>
</html>
